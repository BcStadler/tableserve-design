<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TableServe — New Order</title>
    <link
      rel="stylesheet"
      href="/node_modules/bootstrap/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    {{>header}}
    <main class="d-flex">
      {{>nav}}
      <section class="content p-4 flex-grow-1">
        <form class="form w-100">
          <div>
            <div
              class="d-flex justify-content-between pb-4 mb-5 border-bottom border-2"
            >
              <h2 class="form-label"><strong>New Order</strong></h2>
            </div>

            <div class="mb-4 w-75">
              <label for="tableNumber" class="form-label">Table Number</label>
              <input
                id="tableNumber"
                class="form-control"
                type="number"
                min="1"
                placeholder="Enter table number"
              />
            </div>

            <div class="mb-4 w-75">
              <label for="orderNotes" class="form-label">Order Notes</label>
              <textarea
                id="orderNotes"
                class="form-control"
                rows="3"
                placeholder="Enter notes for this order (optional)"
              ></textarea>
            </div>

            <div class="row g-3 mb-4 w-50">
              <div class="col-12">
                <label for="status" class="form-label">Status</label>
                <select id="status" class="form-select">
                  <option value="PLACED" selected>Placed</option>
                  <option value="PREPARING">Preparing</option>
                  <option value="READY">Ready</option>
                  <option value="SERVED">Served</option>
                  <option value="CANCELLED">Cancelled</option>
                </select>
              </div>
              <div class="col-13">
                <label for="staff" class="form-label">Staff</label>
                <select id="staff" class="form-select">
                  <option value="">Select staff...</option>
                  <option value="casey">Casey Nguyen</option>
                  <option value="alex">Alex Porter</option>
                  <option value="jamie">Jamie Lee</option>
                </select>
              </div>
            </div>

            <div class="d-flex justify-content-end mt-4">
              <a href="/order-detail.html" class="btn btn-outline-primary me-2"
                >Cancel</a
              >
              <button type="submit" class="btn btn-primary">
                <svg
                  class="bi pe-none me-2"
                  width="16"
                  height="16"
                  fill="#FFFFFF"
                >
                  <use href="/assets/bootstrap-icons.svg#save" />
                </svg>
                Save item
              </button>
            </div>
          </div>
        </form>
      </section>
    </main>
    <script src="/node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
