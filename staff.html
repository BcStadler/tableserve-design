<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TableServe — Staff</title>
    <link
      rel="stylesheet"
      href="/node_modules/bootstrap/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    {{> header}}
    <main class="d-flex">
      {{> nav}}
      <section class="content p-4 flex-grow-1">
        <div
          class="d-flex justify-content-between pb-4 mb-4 border-bottom border-2"
        >
          <h2>Staff</h2>
          <a href="/staff-create.html" class="btn btn-primary">
            <svg class="bi pe-none me-2" width="32" height="32" fill="#FFFFFF">
              <use href="/assets/bootstrap-icons.svg#plus" />
            </svg>
            Add Staff
          </a>
        </div>
        <section
          class="list d-flex flex-row flex-wrap bg-light gap-5 p-4 rounded-4"
        >
          <div class="card" style="width: 30rem">
            <div class="progress"></div>
            <div class="py-4 px-4">
              <div class="d-flex justify-content-end">
                <div class="dropdown d-inline">
                  <button
                    class="btn btn-light"
                    style="background: none"
                    type="button"
                    data-bs-toggle="dropdown"
                    aria-expanded="false"
                  >
                    <svg
                      class="bi pe-none me-2"
                      width="20"
                      height="20"
                      fill="#007AFF"
                    >
                      <use
                        href="/assets/bootstrap-icons.svg#three-dots-vertical"
                      />
                    </svg>
                  </button>
                  <ul class="dropdown-menu">
                    <li>
                      <a class="dropdown-item" href="/staff-edit.html">Edit</a>
                    </li>
                    <li>
                      <a
                        class="dropdown-item"
                        href="#"
                        data-bs-toggle="modal"
                        data-bs-target="#deleteStaffModal"
                        >Delete</a
                      >
                    </li>
                  </ul>
                </div>
              </div>
              <div class="d-flex gap-3 mb-3 staff-card-header">
                <div class="avatar-initial">JR</div>
                <div>
                  <span class="fs-4 lh-l fw-medium">Jordan Reyes</span><br />
                  <span class="fs-6 fw-lighter">jreyes</span><br />
                  <span class="fs-6 fw-lighter">(123) 456-7890</span><br />
                  <span class="fs-6 fw-lighter">jreyes@email.com</span><br />
                  <span class="badge text-bg-primary mt-1">Manager</span>
                  <span class="badge text-bg-dark mt-1">Admin</span>
                </div>
              </div>
            </div>
          </div>
        </section>
      </section>
    </main>

    <div
      class="modal fade"
      id="deleteStaffModal"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Delete Staff</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <p>Are you sure you want to delete this staff member?</p>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-outline-primary"
              data-bs-dismiss="modal"
            >
              Cancel
            </button>
            <button
              type="button"
              class="btn btn-danger"
              data-bs-dismiss="modal"
            >
              Delete
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="/node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
