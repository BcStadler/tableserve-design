<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TableServe — New Staff</title>
    <link
      rel="stylesheet"
      href="/node_modules/bootstrap/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    {{> header}}
    <main class="d-flex">
      {{> nav}}
      <section class="content p-4 flex-grow-1">
        <div
          class="d-flex justify-content-between pb-4 mb-4 border-bottom border-2"
        >
          <h2>New Staff</h2>
        </div>
        <form class="row g-3 w-75">
          <div class="col-md-6">
            <div class="mb-3">
              <label for="firstName" class="form-label">First Name</label>
              <input
                id="firstName"
                type="text"
                class="form-control"
                placeholder="Enter first name"
                required
              />
              <div class="invalid-feedback">First name is required</div>
            </div>
          </div>
          <div class="col-md-6">
            <div class="mb-3">
              <label for="lastName" class="form-label">Last Name</label>
              <input
                id="lastName"
                type="text"
                class="form-control"
                placeholder="Enter last name"
                required
              />
              <div class="invalid-feedback">last name is required</div>
            </div>
          </div>
          <div class="col-md-6">
            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input
                id="email"
                type="email"
                class="form-control"
                placeholder="Enter email"
              />
            </div>
          </div>
          <div class="col-md-6">
            <div class="mb-3">
              <label for="phone" class="form-label">Phone</label>
              <input
                id="phone"
                type="tel"
                class="form-control"
                placeholder="Enter phone"
              />
            </div>
          </div>
          <div class="col-md-6">
            <div class="mb-3">
              <label for="username" class="form-label">Username</label>
              <input
                id="username"
                type="text"
                class="form-control"
                placeholder="Enter username"
                required
                maxlength="50"
              />
              <div class="invalid-feedback">Username is required</div>
            </div>
          </div>
          <div class="col-md-6">
            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input
                id="password"
                type="password"
                class="form-control"
                placeholder="Enter password"
                required
                maxlength="60"
              />
              <div class="invalid-feedback">Password is required</div>
            </div>
          </div>
          <div class="col-md-6">
            <div class="form-check">
              <input
                class="form-check-input"
                type="checkbox"
                id="manager"
                name="manager"
              />

              <label class="form-check-label" for="manager">Manager</label>
            </div>
          </div>
          <div class="col-md-6">
            <div class="form-check">
              <input
                class="form-check-input"
                type="checkbox"
                id="Admin"
                name="Admin"
              />
              <label class="form-check-label" for="manager">Admin</label>
            </div>
          </div>
          <div class="row-3 d-flex flex-row justify-content-end w-100 gap-4">
            <div class="d-flex justify-content-end mt-4">
              <a href="/staff.html" class="btn btn-outline-primary me-2"
                >Cancel</a
              >
              <button type="submit" class="btn btn-primary">
                <svg
                  class="bi pe-none me-2"
                  width="16"
                  height="16"
                  fill="#FFFFFF"
                >
                  <use href="/assets/bootstrap-icons.svg#save" />
                </svg>
                Save Staff
              </button>
            </div>
          </div>
        </form>
      </section>
    </main>
    <script src="/node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="JS/validation.js"></script>
  </body>
</html>
